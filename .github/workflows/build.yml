name: Build

# CI gate for spice-plugin-api. Compiles the SPI and confirms the artifact
# builds, on every pull request and push to main.
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Build plugin-api
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"

      - name: Build
        run: mvn --batch-mode verify
